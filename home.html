<!DOCTYPE html>
<html>
<head>
<title>NoteVault</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#05010a;
  filter: blur(25%);
  color:white;
  overflow-y:scroll;
  overflow-x:hidden;
  position:relative;
}

body::before,
body::after{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}
body::before{
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-size: 300px 300px, 170px 170px;
  background-position: 0 0, 0 0;
  animation: moveStars1 55s ease-in-out infinite, moveStars2 75s ease-in-out infinite alternate;
}
body::after{
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 90px 90px;
  background-position: 0 0;
  animation: moveStars3 65s ease-in-out infinite;
}

/* ===== ANIMATIONS & FONTS ===== */
@keyframes fadeInUp{
  from{ opacity:0; transform:translateY(30px); }
  to{ opacity:1; transform:translateY(0); }
}
@keyframes pulse{
  0%,100%{ opacity:1; }
  50%{ opacity:0.8; }
}
@keyframes moveStars1{
  0%  { background-position: 0px 0px; }
  15% { background-position: 80px -40px; }
  30% { background-position: -60px 110px; }
  45% { background-position: 130px 70px; }
  60% { background-position: -90px -130px; }
  75% { background-position: 50px 160px; }
  90% { background-position: -140px 30px; }
  100%{ background-position: 0px 0px; }
}
@keyframes moveStars2{
  0%  { background-position: 0px 0px; }
  20% { background-position: -70px 90px; }
  40% { background-position: 110px -50px; }
  55% { background-position: -30px -120px; }
  70% { background-position: 90px 60px; }
  85% { background-position: -120px 40px; }
  100%{ background-position: 0px 0px; }
}
@keyframes moveStars3{
  0%  { background-position: 0px 0px; }
  10% { background-position: 40px 70px; }
  25% { background-position: -80px -30px; }
  50% { background-position: 60px -90px; }
  65% { background-position: -50px 100px; }
  80% { background-position: 100px 20px; }
  100%{ background-position: 0px 0px; }
}

/* ===== CURSOR GLOW ===== */
#glow{
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(140,0,255,0.35),transparent);
  filter:blur(90px);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* ===== HEADER ===== */
.logo{
  position:fixed;
  top:25px;
  left:35px;
  font-size:22px;
  font-weight:700;
  z-index:10;
  font-family:'Poppins',sans-serif;
}

/* ===== WELCOME TEXT ===== */
#welcome{
  font-family:'Poppins',sans-serif;
  font-size:2.5rem;
  font-weight:700;
  text-align:center;
  width:100%;
  margin-bottom:30px;
  background:linear-gradient(to right, #7b2ff7, #9f44ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 2s infinite;
  padding:0 20px;
}

.logout{
  position:fixed;
  top:25px;
  right:35px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#7b2ff7,#9f44ff);
  color:white;
  cursor:pointer;
  z-index:10;
}

/* ===== MAIN CONTAINER ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  z-index:1;
  padding:20px;
  box-sizing:border-box;
  width:100%;
}

/* ===== UPLOAD CARD ===== */
.card{
  width:320px;
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,0.10);
  display:flex;
  flex-direction:column;
  gap:14px;
  box-sizing:border-box;
}

/* ===== INPUT ===== */
input[type="text"],
input[type="file"],
input:not([type="checkbox"]) {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  box-sizing:border-box;
  margin:0;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#7b2ff7,#9f44ff);
  color:white;
  cursor:pointer;
  margin:0;
}

/* ===== GRID ===== */
#files{
  margin-top:50px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  width:90%;
  max-width:1200px;
  padding-bottom:80px;
  padding-top:16px;
  padding-left:16px;
  padding-right:16px;
}

/* ===== FILE CARD ===== */
.fileCard{
  position:relative;
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.10);
  text-align:center;
  overflow:visible;
  transition:background 0.25s, box-shadow 0.25s;
}

.fileCard.hovered{
  background:rgba(123,47,247,0.18);
  box-shadow:0 0 24px rgba(123,47,247,0.35);
}

/* ===== DELETE BUTTON ===== */
.deleteIcon{
  position:absolute;
  top:-10px;
  right:-10px;
  width:28px;
  height:28px;
  display:none;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#ff6b6b;
  border:2px solid #fff;
  color:#fff;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  z-index:99999;
  box-shadow:0 0 12px rgba(255,107,107,0.8);
  transition:all 0.2s ease;
}
.deleteIcon:hover{
  background:#ff5252;
  box-shadow:0 0 16px rgba(255,82,82,0.9);
  transform:scale(1.1);
}

/* ===== DOWNLOAD BUTTON ===== */
.downloadBtn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#7b2ff7,#9f44ff);
  color:white;
  cursor:pointer;
}

/* ===== TOGGLE ROW ===== */
.toggle-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

/* ===== TOAST NOTIFICATION (bottom-right) ===== */
#toast{
  position:fixed;
  bottom:28px;
  right:28px;
  padding:14px 22px;
  border-radius:14px;
  color:white;
  font-family:'Poppins',sans-serif;
  font-size:14px;
  font-weight:600;
  z-index:99999;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  opacity:0;
  transform:translateY(20px);
  transition:opacity 0.35s ease, transform 0.35s ease;
  pointer-events:none;
  backdrop-filter:blur(10px);
}
#toast.show{
  opacity:1;
  transform:translateY(0);
}
#toast.success{ background:linear-gradient(135deg,rgba(76,175,80,0.85),rgba(139,195,74,0.85)); border:1px solid rgba(255,255,255,0.15); }
#toast.error{   background:linear-gradient(135deg,rgba(244,67,54,0.85),rgba(233,30,99,0.85));  border:1px solid rgba(255,255,255,0.15); }
#toast.info{    background:linear-gradient(135deg,rgba(123,47,247,0.85),rgba(159,68,255,0.85)); border:1px solid rgba(255,255,255,0.15); }

/* ===== GLASS CONFIRM MODAL ===== */
#confirmOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  z-index:99998;
  align-items:center;
  justify-content:center;
}
#confirmOverlay.show{
  display:flex;
}
#confirmBox{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;
  padding:36px 40px;
  text-align:center;
  max-width:340px;
  width:90%;
  box-shadow:0 8px 48px rgba(0,0,0,0.5);
  animation:fadeInUp 0.3s ease;
}
#confirmBox p{
  font-family:'Poppins',sans-serif;
  font-size:1.05rem;
  font-weight:600;
  color:white;
  margin:0 0 28px 0;
}
#confirmBox .confirm-icon{
  font-size:2.2rem;
  margin-bottom:14px;
}
.confirm-btns{
  display:flex;
  gap:14px;
  justify-content:center;
}
.confirm-btns button{
  padding:11px 28px;
  border:none;
  border-radius:12px;
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  transition:transform 0.2s, box-shadow 0.2s;
}
.confirm-btns button:hover{ transform:translateY(-2px); }
#confirmYes{
  background:linear-gradient(90deg,#ff4b4b,#ff6b6b);
  color:white;
  box-shadow:0 4px 16px rgba(255,75,75,0.4);
}
#confirmNo{
  background:rgba(255,255,255,0.12);
  color:white;
  border:1px solid rgba(255,255,255,0.2);
}

/* ===== MODERN TOGGLE SWITCH ===== */
.toggle-switch{
  position:relative;
  display:inline-block;
  width:52px;
  height:28px;
  flex-shrink:0;
}
.toggle-switch input{
  opacity:0;
  width:0;
  height:0;
  position:absolute;
}
.toggle-slider{
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background-color:#444;
  transition:.35s;
  border-radius:28px;
  display:flex;
  align-items:center;
}
/* knob */
.toggle-slider:before{
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:4px;
  background-color:white;
  transition:.35s;
  border-radius:50%;
  z-index:2;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
/* icons inside track */
.toggle-icon{
  position:absolute;
  font-size:11px;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  transition:opacity .3s;
  z-index:1;
}
.icon-off{ left:7px; opacity:1; }
.icon-on{  right:7px; opacity:0; }

/* checked state */
input:checked + .toggle-slider{
  background-color:#7b2ff7;
}
input:checked + .toggle-slider:before{
  transform:translateX(24px);
}
input:checked + .toggle-slider .icon-off{ opacity:0; }
input:checked + .toggle-slider .icon-on{  opacity:1; }

.toggle-label{
  font-size:14px;
  color:#ccc;
  cursor:pointer;
  user-select:none;
  line-height:1;
}

</style>
</head>

<body>

<!-- cursor glow -->
<div id="glow"></div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- Glass confirm modal -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <div class="confirm-icon">🗑️</div>
    <p>Delete this note?</p>
    <div class="confirm-btns">
      <button id="confirmYes">Delete</button>
      <button id="confirmNo">Cancel</button>
    </div>
  </div>
</div>

<div class="logo">NoteVault</div>
<button class="logout" onclick="logout()">Logout</button>

<div class="container">

  <h1 id="welcome">NoteVault</h1>

  <div class="card">
    <input type="file" id="file">
    <input id="title" placeholder="Title">
    <input id="subject" placeholder="Subject">
    <div class="toggle-row">
      <label class="toggle-switch" for="publicToggle">
        <input type="checkbox" id="publicToggle">
        <span class="toggle-slider">
          <span class="toggle-icon icon-off">👁️‍🗨️</span>
          <span class="toggle-icon icon-on">👁️</span>
        </span>
      </label>
      <label class="toggle-label" for="publicToggle">Make Public</label>
    </div>
    <button class="btn" onclick="upload()">Upload</button>
  </div>

  <div id="files"></div>

</div>

<script>

/* ===== CURSOR GLOW ===== */
const isMobile = window.matchMedia("(pointer: coarse)").matches;

if(!isMobile){
  // Desktop: follow mouse
  document.addEventListener("mousemove", e => {
    const glow = document.getElementById("glow");
    if(glow){
      glow.style.left = e.clientX + "px";
      glow.style.top  = e.clientY + "px";
    }
  });
} else {
  // Mobile: move to tap position, then drift randomly
  const glow = document.getElementById("glow");
  let targetX = window.innerWidth / 2;
  let targetY = window.innerHeight / 2;
  let currentX = targetX;
  let currentY = targetY;

  // On tap, snap to touch position
  document.addEventListener("touchstart", e => {
    targetX = e.touches[0].clientX;
    targetY = e.touches[0].clientY;
  }, { passive: true });

  // Pick a new random target every 3-5 seconds
  function pickNewTarget(){
    targetX = Math.random() * window.innerWidth;
    targetY = Math.random() * window.innerHeight;
    const next = 3000 + Math.random() * 2000;
    setTimeout(pickNewTarget, next);
  }
  pickNewTarget();

  // Smoothly interpolate glow toward target every frame
  function animateGlow(){
    currentX += (targetX - currentX) * 0.02;
    currentY += (targetY - currentY) * 0.02;
    if(glow){
      glow.style.left = currentX + "px";
      glow.style.top  = currentY + "px";
    }
    requestAnimationFrame(animateGlow);
  }
  animateGlow();
}

/* ===== ADMIN ===== */
const ADMIN_EMAIL = "padmeshp19@gmail.com";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey:     "AIzaSyCL3TX71MDaVLUqFHG6nkKRniol16kefV0",
  authDomain: "notevalt-1be63.firebaseapp.com",
  projectId:  "notevalt-1be63"
};

firebase.initializeApp(firebaseConfig);

const db   = firebase.firestore();
const auth = firebase.auth();

/* == AUTH == */
auth.onAuthStateChanged(user => {
  if (!user) {
    location.href = "index.html";
  } else {
    document.getElementById("welcome").innerText =
      "Welcome, " + (user.displayName || user.email.split("@")[0]);
    loadNotes();
  }
});

/* ===== TOAST (bottom-right in-app notification) ===== */
function showToast(message, type = "info") {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.className = type + " show";
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.className = type;
  }, 3000);
}

/* ===== GLASS CONFIRM MODAL ===== */
function showConfirm(onConfirm) {
  const overlay = document.getElementById("confirmOverlay");
  overlay.classList.add("show");

  const yes = document.getElementById("confirmYes");
  const no  = document.getElementById("confirmNo");

  // Clone to remove old listeners
  const newYes = yes.cloneNode(true);
  const newNo  = no.cloneNode(true);
  yes.parentNode.replaceChild(newYes, yes);
  no.parentNode.replaceChild(newNo, no);

  newYes.onclick = () => {
    overlay.classList.remove("show");
    onConfirm();
  };
  newNo.onclick = () => {
    overlay.classList.remove("show");
  };
}

/* ===== LOGOUT ===== */
function logout(){
  auth.signOut().then(() => location.href = "index.html");
}

/* ===== UPLOAD ===== */
let isUploading = false;

function upload(){
  if(isUploading) return; // block multiple clicks

  const file    = document.getElementById("file").files[0];
  const title   = document.getElementById("title").value;
  const subject = document.getElementById("subject").value;
  const isPublic = document.getElementById("publicToggle").checked;

  if (!file){ showToast("Please select a file", "error"); return; }

  isUploading = true;
  const uploadBtn = document.querySelector('.btn');
  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";

  const reader = new FileReader();

  reader.onload = async function(e){
    try {
      await db.collection("notes").add({
        userId:    auth.currentUser.uid,
        file:      e.target.result,
        fileName:  file.name,
        title:     title,
        subject:   subject,
        visibility: isPublic ? "public" : "private",
        createdAt: Date.now()
      });

      showToast("File uploaded successfully! ✓", "success");

      document.getElementById("file").value    = "";
      document.getElementById("title").value   = "";
      document.getElementById("subject").value = "";
      document.getElementById("publicToggle").checked = false;

    } catch (error) {
      console.error("Upload error:", error);
      showToast("Upload failed. Please try again.", "error");
    } finally {
      isUploading = false;
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload";
      loadNotes();
    }
  };

  reader.readAsDataURL(file);
}

/* ===== DELETE ===== */
function deleteNote(id, ownerId){
  const currentUser = auth.currentUser;
  if(currentUser.uid !== ownerId && currentUser.email !== ADMIN_EMAIL){
    showToast("You can only delete your own notes.", "error");
    return;
  }

  showConfirm(() => {
    db.collection("notes").doc(id).delete()
      .then(() => {
        showToast("Note deleted successfully! ✓", "success");
        loadNotes();
      })
      .catch(err => {
        console.error(err);
        showToast("Delete failed. Please try again.", "error");
      });
  });
}

/* ===== LOAD NOTES ===== */
function loadNotes(){
  const container = document.getElementById("files");
  container.innerHTML = "";

  db.collection("notes").orderBy("createdAt", "desc").get()
  .then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();

      const visibility = data.visibility !== undefined ? data.visibility : "public";

      if (visibility !== "public" && data.userId !== auth.currentUser.uid) {
        return;
      }

      const card = document.createElement("div");
      card.className = "fileCard";

      const del = document.createElement("span");
      del.className = "deleteIcon";
      del.textContent = "×";
      del.onclick = function(e){
        e.stopPropagation();
        deleteNote(doc.id, data.userId);
      };

      const canDelete = data.userId === auth.currentUser.uid || auth.currentUser.email === ADMIN_EMAIL;

      card.addEventListener("mouseenter", function(){
        card.classList.add("hovered");
        if(canDelete) del.style.display = "flex";
      });
      card.addEventListener("mouseleave", function(){
        card.classList.remove("hovered");
        del.style.display = "none";
      });

      const h3 = document.createElement("h3");
      h3.textContent = data.title || "No Title";

      const p = document.createElement("p");
      p.textContent = data.subject || "";

      const a = document.createElement("a");
      a.href     = data.file;
      a.download = data.fileName || "file";

      const dlBtn = document.createElement("button");
      dlBtn.className   = "downloadBtn";
      dlBtn.textContent = "Download";
      a.appendChild(dlBtn);

      card.appendChild(del);
      card.appendChild(h3);
      card.appendChild(p);
      card.appendChild(a);

      container.appendChild(card);
    });
  });
}

</script>

</body>
</html>
