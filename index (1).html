<!DOCTYPE html>
<html>
<head>
<title>NoteVault</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#05010a;
  filter: blur(25%);
  color:white;
  overflow:hidden;
  position:relative;
}
body::before,
body::after{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}
body::before{
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-size: 300px 300px, 170px 170px;
  background-position: 0 0, 0 0;
  animation: moveStars1 55s ease-in-out infinite, moveStars2 75s ease-in-out infinite alternate;
}
body::after{
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 90px 90px;
  background-position: 0 0;
  animation: moveStars3 65s ease-in-out infinite;
}
.logo{
  position:absolute;top:25px;left:35px;font-weight:700;font-size:22px;
  font-family:'Poppins',sans-serif;
}
#glow{
  position:fixed;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle, rgba(140,0,255,0.35), transparent);
  filter:blur(90px);pointer-events:none;
  z-index:0;
}
.container{
  height:100vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  position:relative;z-index:1;
  text-align:center;
  animation:fadeInUp 1s ease-out;
}
.card{
  width:350px;padding:25px;border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  animation:fadeInUp 1s ease-out 0.3s both;
}
h1{
  font-family:'Poppins',sans-serif;
  font-size:3.5rem;
  font-weight:700;
  margin-bottom:5px;
  background:linear-gradient(to right, #7b2ff7, #9f44ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 2s infinite;
}
.subtitle{
  font-family:'Poppins',sans-serif;
  font-size:2rem;
  font-weight:600;
  color:white;
  margin-bottom:20px;
  opacity:0.85;
  letter-spacing:0.02em;
}
input{
  width:100%;margin:10px 0;padding:12px;border-radius:10px;
  border:none;background:rgba(255,255,255,0.12);color:white;
  font-family:'Poppins',sans-serif;box-sizing:border-box;
  -webkit-appearance:none;
  appearance:none;
  outline:none;
}
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{
  -webkit-box-shadow:0 0 0px 1000px rgba(255,255,255,0.12) inset !important;
  -webkit-text-fill-color:white !important;
  caret-color:white;
  border-radius:10px !important;
  border:none !important;
  transition:background-color 5000s ease-in-out 0s;
}
.btn{
  width:100%;padding:12px;margin-top:10px;border:none;
  border-radius:12px;background:linear-gradient(90deg,#7b2ff7,#9f44ff);
  color:white;font-weight:700;cursor:pointer;transition:0.25s;
  font-family:'Poppins',sans-serif;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(140,0,255,0.6);}
.google{
  margin-top:10px;width:100%;padding:12px;border-radius:12px;
  background:white;color:black;display:flex;justify-content:center;
  align-items:center;gap:10px;font-weight:700;cursor:pointer;
  font-family:'Poppins',sans-serif;
}
@keyframes fadeInUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
@keyframes pulse{
  0%,100%{
    opacity:1;
  }
  50%{
    opacity:0.8;
  }
}
@keyframes moveStars1{
  0%  { background-position: 0px 0px; }
  15% { background-position: 80px -40px; }
  30% { background-position: -60px 110px; }
  45% { background-position: 130px 70px; }
  60% { background-position: -90px -130px; }
  75% { background-position: 50px 160px; }
  90% { background-position: -140px 30px; }
  100%{ background-position: 0px 0px; }
}
@keyframes moveStars2{
  0%  { background-position: 0px 0px; }
  20% { background-position: -70px 90px; }
  40% { background-position: 110px -50px; }
  55% { background-position: -30px -120px; }
  70% { background-position: 90px 60px; }
  85% { background-position: -120px 40px; }
  100%{ background-position: 0px 0px; }
}
@keyframes moveStars3{
  0%  { background-position: 0px 0px; }
  10% { background-position: 40px 70px; }
  25% { background-position: -80px -30px; }
  50% { background-position: 60px -90px; }
  65% { background-position: -50px 100px; }
  80% { background-position: 100px 20px; }
  100%{ background-position: 0px 0px; }
}
</style>
</head>

<body>

<div class="logo">NoteVault</div>
<div id="glow"></div>

<div class="container">
<h1>Share Notes. Ace Together.</h1>
<p class="subtitle">Public space. Choose what you share.</p>

<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="signup()">Sign Up</button>
<button class="btn" onclick="login()">Login</button>

<button class="google" onclick="googleLogin()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
Continue with Google
</button>
</div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyCL3TX71MDaVLUqFHG6nkKRniol16kefV0",
  authDomain:"notevalt-1be63.firebaseapp.com",
  projectId:"notevalt-1be63",
  storageBucket:"notevalt-1be63.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

/* FIXED AUTH CHECK (NO AUTO LOOP) */
auth.onAuthStateChanged(user=>{
  if(user && window.location.pathname.includes("index")){
    location.href="home.html";
  }
});

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>location.href="home.html")
  .catch(e=>alert(e.message));
}

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>location.href="home.html")
  .catch(e=>alert(e.message));
}

/* GOOGLE LOGIN (STORE NAME) */
function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  auth.signInWithPopup(provider).then(result=>{
    const user=result.user;

    if(!user.displayName){
      user.updateProfile({
        displayName:user.email.split("@")[0]
      });
    }

    location.href="home.html";
  }).catch(e=>alert(e.message));
}

/* CURSOR GLOW */
const isMobile = window.matchMedia("(pointer: coarse)").matches;

if(!isMobile){
  document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top  = e.clientY + "px";
  });
} else {
  let targetX = window.innerWidth / 2;
  let targetY = window.innerHeight / 2;
  let currentX = targetX;
  let currentY = targetY;

  document.addEventListener("touchstart", e => {
    targetX = e.touches[0].clientX;
    targetY = e.touches[0].clientY;
  }, { passive: true });

  function pickNewTarget(){
    targetX = Math.random() * window.innerWidth;
    targetY = Math.random() * window.innerHeight;
    const next = 3000 + Math.random() * 2000;
    setTimeout(pickNewTarget, next);
  }
  pickNewTarget();

  function animateGlow(){
    currentX += (targetX - currentX) * 0.02;
    currentY += (targetY - currentY) * 0.02;
    glow.style.left = currentX + "px";
    glow.style.top  = currentY + "px";
    requestAnimationFrame(animateGlow);
  }
  animateGlow();
}
</script>

</body>
</html>
